name: Stem
options:
  bundleIdPrefix: md.stem
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    DEVELOPMENT_TEAM: VRNNS4H6XH
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

targets:
  Stem:
    type: application
    platform: iOS
    sources:
      - path: Stem
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.stem.app
        INFOPLIST_FILE: Stem/Info.plist
        CODE_SIGN_ENTITLEMENTS: Stem/Stem.entitlements
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: StemShareExtension
    info:
      path: Stem/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: md.stem.app
            CFBundleURLSchemes:
              - stem
        UIAppFonts:
          - DMSerifDisplay-Regular.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMMono-Regular.ttf
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  StemShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.stem.app.share-extension
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Stem
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true

schemes:
  Stem:
    build:
      targets:
        Stem: all
        StemShareExtension: all
    run:
      config: Debug
    archive:
      config: Release
